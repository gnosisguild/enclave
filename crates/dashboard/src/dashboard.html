<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Enclave Node Dashboard</title>
    <style>
      :root,
      [data-theme='dark'] {
        --bg: #0f1117;
        --surface: #1a1d27;
        --border: #2a2d3a;
        --text: #e1e4ed;
        --text-dim: #8b8fa3;
        --accent: #6c72cb;
        --green: #4ade80;
        --red: #f87171;
        --yellow: #fbbf24;
        --blue: #60a5fa;
        --hover-bg: rgba(108, 114, 203, 0.05);
        --detail-bg: rgba(0, 0, 0, 0.2);
      }
      [data-theme='light'] {
        --bg: #f5f6f8;
        --surface: #ffffff;
        --border: #e2e4e9;
        --text: #1a1d27;
        --text-dim: #6b7084;
        --accent: #5b60b8;
        --green: #16a34a;
        --red: #dc2626;
        --yellow: #ca8a04;
        --blue: #2563eb;
        --hover-bg: rgba(108, 114, 203, 0.06);
        --detail-bg: rgba(0, 0, 0, 0.03);
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: var(--bg);
        color: var(--text);
        line-height: 1.6;
      }
      .header {
        background: var(--surface);
        border-bottom: 1px solid var(--border);
        padding: 16px 24px;
        display: flex;
        align-items: center;
        gap: 16px;
      }
      .header h1 {
        font-size: 18px;
        font-weight: 600;
      }
      .header .dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: var(--green);
      }
      .tabs {
        display: flex;
        gap: 0;
        background: var(--surface);
        border-bottom: 1px solid var(--border);
        padding: 0 24px;
      }
      .tab {
        padding: 10px 20px;
        cursor: pointer;
        color: var(--text-dim);
        border-bottom: 2px solid transparent;
        font-size: 14px;
        transition:
          color 0.2s,
          border-color 0.2s;
      }
      .tab:hover {
        color: var(--text);
      }
      .tab.active {
        color: var(--accent);
        border-bottom-color: var(--accent);
      }
      .content {
        padding: 24px;
        max-width: 1200px;
        margin: 0 auto;
      }
      .panel {
        display: none;
      }
      .panel.active {
        display: block;
      }
      .card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 20px;
        margin-bottom: 16px;
      }
      .card h2 {
        font-size: 14px;
        color: var(--text-dim);
        text-transform: uppercase;
        letter-spacing: 0.5px;
        margin-bottom: 12px;
      }
      .info-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        gap: 12px;
      }
      .info-item {
        display: flex;
        flex-direction: column;
        gap: 2px;
      }
      .info-label {
        font-size: 12px;
        color: var(--text-dim);
      }
      .info-value {
        font-family: 'SF Mono', 'Fira Code', monospace;
        font-size: 14px;
        word-break: break-all;
      }
      table {
        width: 100%;
        border-collapse: collapse;
      }
      th {
        text-align: left;
        padding: 8px 12px;
        font-size: 12px;
        color: var(--text-dim);
        text-transform: uppercase;
        letter-spacing: 0.5px;
        border-bottom: 1px solid var(--border);
      }
      td {
        padding: 8px 12px;
        font-size: 13px;
        font-family: 'SF Mono', 'Fira Code', monospace;
        border-bottom: 1px solid var(--border);
        max-width: 300px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      tr:hover td {
        background: var(--hover-bg);
      }
      .detail-row td {
        white-space: pre-wrap;
        word-break: break-all;
        background: var(--detail-bg);
        font-size: 12px;
      }
      .controls {
        display: flex;
        gap: 12px;
        align-items: center;
        margin-bottom: 16px;
        flex-wrap: wrap;
      }
      input[type='text'] {
        background: var(--bg);
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 6px 12px;
        color: var(--text);
        font-size: 13px;
        outline: none;
      }
      input[type='text']:focus,
      select:focus {
        border-color: var(--accent);
      }
      select {
        background: var(--bg);
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 6px 12px;
        color: var(--text);
        font-size: 13px;
        outline: none;
        cursor: pointer;
      }
      button {
        background: var(--accent);
        color: #fff;
        border: none;
        border-radius: 6px;
        padding: 6px 16px;
        cursor: pointer;
        font-size: 13px;
        transition: opacity 0.2s;
      }
      button:hover {
        opacity: 0.85;
      }
      button:disabled {
        opacity: 0.4;
        cursor: not-allowed;
      }
      .btn-secondary {
        background: var(--border);
      }
      label {
        font-size: 13px;
        color: var(--text-dim);
        display: flex;
        align-items: center;
        gap: 6px;
      }
      pre {
        background: var(--bg);
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 16px;
        font-family: 'SF Mono', 'Fira Code', monospace;
        font-size: 13px;
        white-space: pre-wrap;
        word-break: break-all;
        overflow-x: auto;
        max-height: 500px;
        overflow-y: auto;
      }
      .loading {
        color: var(--text-dim);
        font-style: italic;
      }
      .theme-toggle {
        margin-left: auto;
        background: var(--border);
        border: none;
        border-radius: 6px;
        padding: 6px 12px;
        cursor: pointer;
        font-size: 16px;
        line-height: 1;
        transition: background 0.2s;
      }
      .theme-toggle:hover {
        background: var(--accent);
      }
      .error {
        color: var(--red);
      }
      .badge {
        display: inline-block;
        padding: 2px 8px;
        border-radius: 4px;
        font-size: 11px;
        font-weight: 600;
      }
      .badge-green {
        background: rgba(74, 222, 128, 0.15);
        color: var(--green);
      }
      .badge-red {
        background: rgba(248, 113, 113, 0.15);
        color: var(--red);
      }
      .badge-yellow {
        background: rgba(251, 191, 36, 0.15);
        color: var(--yellow);
      }
      tr.evt-error td {
        border-left: 3px solid var(--red);
      }
      tr.evt-warn td {
        border-left: 3px solid var(--yellow);
      }
      tr.evt-state td {
        border-left: 3px solid var(--green);
      }
    </style>
  </head>
  <body>
    <div class="header">
      <div class="dot" id="status-dot"></div>
      <h1>Enclave Node Dashboard</h1>
      <button class="theme-toggle" id="theme-toggle" onclick="toggleTheme()" title="Toggle light/dark mode">&#9790;</button>
    </div>
    <div class="tabs">
      <div class="tab active" data-tab="overview">Overview</div>
      <div class="tab" data-tab="events">Events</div>
      <div class="tab" data-tab="status">Status</div>
    </div>
    <div class="content">
      <!-- Overview -->
      <div class="panel active" id="panel-overview">
        <div class="card">
          <h2>Node Information</h2>
          <div class="info-grid" id="node-info">
            <div class="info-item"><span class="info-label">Name</span><span class="info-value" id="ov-name">...</span></div>
            <div class="info-item"><span class="info-label">Address</span><span class="info-value" id="ov-address">...</span></div>
            <div class="info-item"><span class="info-label">Peer ID</span><span class="info-value" id="ov-peer-id">...</span></div>
            <div class="info-item"><span class="info-label">QUIC Port</span><span class="info-value" id="ov-quic-port">...</span></div>
            <div class="info-item"><span class="info-label">Ctrl Port</span><span class="info-value" id="ov-ctrl-port">...</span></div>
          </div>
        </div>
        <div class="card">
          <h2>Noir Prover</h2>
          <pre id="ov-noir" class="loading">Loading...</pre>
        </div>
      </div>

      <!-- Events -->
      <div class="panel" id="panel-events">
        <div class="controls">
          <input type="text" id="evt-filter" placeholder="Filter by type..." />
          <input type="text" id="evt-e3-filter" placeholder="Filter by E3 ID..." />
          <select id="evt-source-filter">
            <option value="">All sources</option>
            <option value="Local">Local</option>
            <option value="Net">Net</option>
            <option value="Evm">Evm</option>
          </select>
          <select id="evt-severity-filter">
            <option value="">All events</option>
            <option value="error">Errors only</option>
            <option value="warning">Warnings</option>
            <option value="state">State changes</option>
          </select>
          <select id="evt-sort">
            <option value="seq-desc">Newest first</option>
            <option value="seq-asc">Oldest first</option>
            <option value="type-asc">Type A-Z</option>
            <option value="type-desc">Type Z-A</option>
            <option value="source-asc">Source A-Z</option>
          </select>
          <button id="evt-refresh" onclick="loadEvents()">Refresh</button>
          <label><input type="checkbox" id="evt-auto" /> Auto-refresh</label>
        </div>
        <div class="card" style="padding: 0; overflow-x: auto">
          <table>
            <thead>
              <tr>
                <th>Seq</th>
                <th>Timestamp</th>
                <th>Type</th>
                <th>E3 ID</th>
                <th>Source</th>
              </tr>
            </thead>
            <tbody id="evt-body"></tbody>
          </table>
        </div>
        <button id="evt-more" class="btn-secondary" onclick="loadMoreEvents()">Load More</button>
      </div>

      <!-- Status -->
      <div class="panel" id="panel-status">
        <div class="card">
          <h2>Ciphernode Status</h2>
          <pre id="st-ciphernode" class="loading">Loading...</pre>
        </div>
        <div class="card">
          <h2>Wallet</h2>
          <pre id="st-wallet" class="loading">Loading...</pre>
        </div>
      </div>
    </div>

    <script>
      // Theme
      function getTheme() {
        return localStorage.getItem('enclave-theme') || 'dark'
      }
      function applyTheme(t) {
        document.documentElement.setAttribute('data-theme', t)
        document.getElementById('theme-toggle').textContent = t === 'dark' ? '\u263E' : '\u2600'
      }
      function toggleTheme() {
        const t = getTheme() === 'dark' ? 'light' : 'dark'
        localStorage.setItem('enclave-theme', t)
        applyTheme(t)
      }
      applyTheme(getTheme())

      // Tab switching
      document.querySelectorAll('.tab').forEach((t) => {
        t.addEventListener('click', () => {
          document.querySelectorAll('.tab').forEach((x) => x.classList.remove('active'))
          document.querySelectorAll('.panel').forEach((x) => x.classList.remove('active'))
          t.classList.add('active')
          document.getElementById('panel-' + t.dataset.tab).classList.add('active')
        })
      })

      // State
      let eventCursor = 0
      let allEvents = []
      let overviewTimer = null
      let eventsTimer = null
      let statusTimer = null

      // Helpers
      async function api(path) {
        const r = await fetch(path)
        return r.text()
      }

      // Wrap large "ts" numbers in quotes before JSON.parse so BigInt can handle them.
      function safeParse(text) {
        var fixed = text.replace(/"ts"\s*:\s*(\d{20,})/g, '"ts":"$1"')
        return JSON.parse(fixed)
      }

      function esc(s) {
        const d = document.createElement('div')
        d.textContent = s
        return d.innerHTML
      }

      // Parse HLC timestamp (u128) to human-readable time.
      // Layout: upper 64 bits = wall clock nanos, lower 64 bits = counter + node.
      // JSON numbers lose precision for u128, so we also accept string values.
      function hlcToTime(ts) {
        try {
          var n = BigInt(ts)
          var nanos = n >> 64n
          var millis = Number(nanos / 1000000n)
          if (millis > 0) return new Date(millis).toLocaleTimeString()
        } catch (_) {}
        return '-'
      }

      // Overview
      async function loadOverview() {
        try {
          const [name, addr, peer, quic, ctrl, noir] = await Promise.all([
            api('/api/config?param=name'),
            api('/api/config?param=address'),
            api('/api/peer-id'),
            api('/api/config?param=quic_port'),
            api('/api/config?param=ctrl_port'),
            api('/api/noir'),
          ])
          document.getElementById('ov-name').textContent = name.trim()
          document.getElementById('ov-address').textContent = addr.trim()
          document.getElementById('ov-peer-id').textContent = peer.trim()
          document.getElementById('ov-quic-port').textContent = quic.trim()
          document.getElementById('ov-ctrl-port').textContent = ctrl.trim()
          const noirEl = document.getElementById('ov-noir')
          noirEl.className = ''
          noirEl.textContent = noir.trim()
          document.getElementById('status-dot').style.background = 'var(--green)'
        } catch (e) {
          document.getElementById('status-dot').style.background = 'var(--red)'
        }
      }

      // Events
      async function loadEvents(since, append) {
        try {
          const s = since !== undefined ? since : 0
          const text = await api('/api/events?since=' + s + '&limit=500')
          // Split on newlines first; if a line fails to parse, try splitting on }{ boundaries
          const lines = text
            .trim()
            .split('\n')
            .filter(function (l) {
              return l.trim().length > 0
            })
          if (!append) allEvents = []
          var cursor = null
          for (var i = 0; i < lines.length; i++) {
            var line = lines[i].trim()
            // Try parsing the line directly
            try {
              var obj = safeParse(line)
              if (obj === 'Done') {
                cursor = null
                continue
              }
              if (obj && obj.Next !== undefined) {
                cursor = obj.Next
                continue
              }
              if (obj && obj.payload) allEvents.push(obj)
              continue
            } catch (_) {}
            // Line failed to parse — might be concatenated JSON objects like "}{".
            // Split on "}{" and try each fragment.
            var fragments = line.split(/\}\s*\{/).map(function (frag, idx, arr) {
              if (arr.length === 1) return frag
              if (idx === 0) return frag + '}'
              if (idx === arr.length - 1) return '{' + frag
              return '{' + frag + '}'
            })
            for (var j = 0; j < fragments.length; j++) {
              try {
                var fobj = safeParse(fragments[j])
                if (fobj === 'Done') {
                  cursor = null
                  continue
                }
                if (fobj && fobj.Next !== undefined) {
                  cursor = fobj.Next
                  continue
                }
                if (fobj && fobj.payload) allEvents.push(fobj)
              } catch (_) {}
            }
          }
          eventCursor = cursor
          renderEvents()
          document.getElementById('evt-more').disabled = cursor === null
        } catch (e) {
          document.getElementById('evt-body').innerHTML =
            '<tr><td colspan="5" class="error">Failed to load events: ' + esc(String(e)) + '</td></tr>'
        }
      }

      function loadMoreEvents() {
        if (eventCursor !== null) loadEvents(eventCursor, true)
      }

      var ERROR_TYPES = [
        'EnclaveError',
        'E3Failed',
        'ProofVerificationFailed',
        'SignedProofFailed',
        'ThresholdShareCollectionFailed',
        'EncryptionKeyCollectionFailed',
      ]
      var WARNING_TYPES = ['AccusationVote', 'ProofFailureAccusation', 'CommitmentMismatch']
      var STATE_TYPES = [
        'E3Requested',
        'CiphernodeSelected',
        'CommitteePublished',
        'CommitteeFinalized',
        'CiphertextOutputPublished',
        'PlaintextOutputPublished',
        'PlaintextAggregated',
        'E3StageChanged',
      ]

      function renderEvents() {
        var filter = document.getElementById('evt-filter').value.toLowerCase()
        var e3Filter = document.getElementById('evt-e3-filter').value.toLowerCase()
        var sourceFilter = document.getElementById('evt-source-filter').value
        var severityFilter = document.getElementById('evt-severity-filter').value
        var sortKey = document.getElementById('evt-sort').value
        var sorted = allEvents.slice()
        sorted.sort(function (a, b) {
          var seqA = (a.ctx || {}).seq || 0
          var seqB = (b.ctx || {}).seq || 0
          if (sortKey === 'seq-asc') return seqA - seqB
          if (sortKey === 'seq-desc') return seqB - seqA
          var typeA = extractType(a)
          var typeB = extractType(b)
          if (sortKey === 'type-asc') return typeA.localeCompare(typeB)
          if (sortKey === 'type-desc') return typeB.localeCompare(typeA)
          if (sortKey === 'source-asc') return ((a.ctx || {}).source || '').localeCompare((b.ctx || {}).source || '')
          return seqB - seqA
        })
        var tbody = document.getElementById('evt-body')
        var rows = []
        for (var i = 0; i < sorted.length; i++) {
          var evt = sorted[i]
          var ctx = evt.ctx || {}
          var type = extractType(evt)
          if (filter && !type.toLowerCase().includes(filter)) continue
          var e3id = extractE3Id(evt)
          if (e3Filter && !String(e3id).toLowerCase().includes(e3Filter)) continue
          if (sourceFilter && ctx.source !== sourceFilter) continue
          if (
            severityFilter === 'error' &&
            !ERROR_TYPES.some(function (t) {
              return type === t
            })
          )
            continue
          if (
            severityFilter === 'warning' &&
            !WARNING_TYPES.some(function (t) {
              return type === t
            })
          )
            continue
          if (
            severityFilter === 'state' &&
            !STATE_TYPES.some(function (t) {
              return type === t
            })
          )
            continue
          var seq = ctx.seq !== undefined ? ctx.seq : '-'
          var src = ctx.source || '-'
          const id = 'evt-' + rows.length
          var ts = hlcToTime(ctx.ts)
          var rowClass =
            ERROR_TYPES.indexOf(type) >= 0
              ? 'evt-error'
              : WARNING_TYPES.indexOf(type) >= 0
                ? 'evt-warn'
                : STATE_TYPES.indexOf(type) >= 0
                  ? 'evt-state'
                  : ''
          rows.push(
            '<tr class="' +
              rowClass +
              '" onclick="toggleDetail(\'' +
              id +
              '\')" style="cursor:pointer">' +
              '<td>' +
              esc(String(seq)) +
              '</td>' +
              '<td>' +
              esc(ts) +
              '</td>' +
              '<td>' +
              esc(type) +
              '</td>' +
              '<td>' +
              esc(String(e3id)) +
              '</td>' +
              '<td>' +
              esc(String(src)) +
              '</td>' +
              '</tr>' +
              '<tr class="detail-row" id="' +
              id +
              '" style="display:none"><td colspan="5">' +
              esc(JSON.stringify(evt.payload, null, 2)) +
              '</td></tr>',
          )
        }
        tbody.innerHTML = rows.length ? rows.join('') : '<tr><td colspan="5" class="loading">No events</td></tr>'
        document.getElementById('evt-refresh').textContent = 'Refresh (' + allEvents.length + ' total, ' + rows.length + ' shown)'
      }

      function extractType(evt) {
        if (evt.payload && typeof evt.payload === 'object') {
          return Object.keys(evt.payload)[0] || 'unknown'
        }
        return 'unknown'
      }

      function extractE3Id(evt) {
        if (!evt.payload) return '-'
        var data = Object.values(evt.payload)[0]
        if (!data || typeof data !== 'object') return '-'
        var eid = data.e3_id !== undefined ? data.e3_id : data.e3Id
        if (eid == null) return '-'
        if (typeof eid === 'object' && eid.id !== undefined) {
          return eid.chain_id !== undefined ? eid.chain_id + ':' + eid.id : String(eid.id)
        }
        return String(eid)
      }

      function toggleDetail(id) {
        const row = document.getElementById(id)
        if (row) row.style.display = row.style.display === 'none' ? '' : 'none'
      }

      document.getElementById('evt-filter').addEventListener('input', renderEvents)
      document.getElementById('evt-e3-filter').addEventListener('input', renderEvents)
      document.getElementById('evt-source-filter').addEventListener('change', renderEvents)
      document.getElementById('evt-severity-filter').addEventListener('change', renderEvents)
      document.getElementById('evt-sort').addEventListener('change', renderEvents)

      // Auto-refresh for events
      document.getElementById('evt-auto').addEventListener('change', function () {
        if (this.checked) {
          eventsTimer = setInterval(() => loadEvents(), 10000)
        } else {
          clearInterval(eventsTimer)
        }
      })

      // Status
      async function loadStatus() {
        try {
          const [cn, wallet] = await Promise.all([api('/api/status'), api('/api/wallet')])
          const cnEl = document.getElementById('st-ciphernode')
          cnEl.className = ''
          cnEl.textContent = cn.trim()
          const wEl = document.getElementById('st-wallet')
          wEl.className = ''
          wEl.textContent = wallet.trim()
        } catch (e) {
          document.getElementById('st-ciphernode').className = 'error'
          document.getElementById('st-ciphernode').textContent = 'Failed to load status'
        }
      }

      // Init
      loadOverview()
      loadEvents()
      loadStatus()
      overviewTimer = setInterval(loadOverview, 10000)
      setInterval(loadStatus, 30000)
    </script>
  </body>
</html>
