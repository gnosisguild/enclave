[workspace]
resolver = "3"
msrv = "1.91.1"
members = ["app", "host", "methods", "types"]
exclude = ["methods/guest"]

[workspace.package]
version = "0.1.0"
edition = "2021"

[workspace.dependencies]
e3-support-app = { path = "./app" }
e3-support-host = { path = "./host" }
e3-user-program = { path = "./program" }
e3-support-types = { path = "./types" }
e3-fhe-params = { git = "https://github.com/gnosisguild/interfold", tag = "v0.2.0" }

methods = { path = "./methods" }
alloy-primitives = { version = "1.3", default-features = false, features = [
    "rlp",
    "serde",
    "std",
]}
alloy-sol-types = { version = "1.3" }
alloy-signer-local = { version = "1.0" }
anyhow = { version = "=1.0.98" }
actix-web = "=4.11.0"
bincode = { version = "=1.3.3" }
bytemuck = { version = "=1.25.0" }
env_logger = "=0.11.8"
hex = { version = "=0.4.3" }
log = { version = "=0.4.27" }
reqwest = { version = "=0.12.22", features = ["json"] }
risc0-build = { version = "=3.0.3", features = ["docker"] }
risc0-build-ethereum = { git = "https://github.com/risc0/risc0-ethereum", tag = "v3.0.0" }
risc0-ethereum-contracts = { git = "https://github.com/risc0/risc0-ethereum", tag = "v3.0.0" }
risc0-zkvm = { version = "=3.0.3" }
risc0-zkp = { version = "=3.0.2", default-features = false }
serde = { version = "1.0", features = ["derive", "std"] }
serde_json = "=1.0.141"
# NOTE: untagged on purpose. e3-compute-provider/e3-fhe-params at interfold
# v0.2.0 declare fhe.rs without a tag. A tag here would be a different Cargo
# source than theirs, yielding two incompatible copies of `fhe`. Keep this bare
# so it unifies with them; the v0.2.2 commit is pinned via Cargo.lock.
fhe = { package = "fhe", git = "https://github.com/gnosisguild/fhe.rs" }
fhe-traits = { git = "https://github.com/gnosisguild/fhe.rs" }
fhe-util = { git = "https://github.com/gnosisguild/fhe.rs" }
e3-compute-provider = { git = "https://github.com/gnosisguild/interfold", tag = "v0.2.0" }
tokio = { version = "=1.46.1", features = ["full"] }
rand = { version = "=0.9.2" }
tracing-subscriber = { version = "=0.3.19", features = ["env-filter"] }
boundless-market = { version = "=1.1.0" }
url = { version = "=2.5.4" }
dotenvy = { version = "=0.15.7" }

[profile.release]
debug = 1
lto = true
