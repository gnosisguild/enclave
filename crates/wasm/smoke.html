<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>e3-wasm browser smoke</title>
  </head>
  <body>
    <script type="module">
      import initializeWasm from './init_web.js'

      // INSECURE_THRESHOLD_512 (crates/fhe-params/src/constants.rs insecure_512::threshold)
      const DEGREE = 512
      const PLAINTEXT_MODULUS = 100n
      const MODULI = [0xffffee001n, 0xffffc4001n]

      try {
        const wasm = await initializeWasm()
        const moduli = BigUint64Array.from(MODULI)
        const pk = wasm.generate_public_key(DEGREE, PLAINTEXT_MODULUS, moduli)
        const ct = wasm.bfv_encrypt_number(42n, pk, DEGREE, PLAINTEXT_MODULUS, moduli)
        if (!(ct instanceof Uint8Array) || ct.length === 0) {
          throw new Error('bfv_encrypt_number returned empty ciphertext')
        }
        window.__wasmSmoke = 'ok'
      } catch (err) {
        window.__wasmSmoke = `error: ${err?.message ?? err}`
        console.error(err)
      }
    </script>
  </body>
</html>
