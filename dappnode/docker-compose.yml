version: '3.5'
services:
  ciphernode:
    build:
      context: .
      args:
        UPSTREAM_VERSION: 0.1.8
    image: 'ciphernode.interfold-ciphernode.public.dappnode.eth:0.1.8'
    restart: unless-stopped
    volumes:
      - 'ciphernode_data:/data'
    ports:
      - 37173:37173/udp
    environment:
      # Required
      RPC_URL: ''
      # Network & node config
      NETWORK: 'sepolia'
      NODE_ADDRESS: ''
      QUIC_PORT: '37173'
      PEERS: ''
      LOG_LEVEL: 'info'
      EXTRA_OPTS: ''
      # Secrets
      ENCRYPTION_PASSWORD: ''
      NETWORK_PRIVATE_KEY: ''
      PRIVATE_KEY: ''
      # Contracts (variants override these)
      INTERFOLD_CONTRACT: ''
      CIPHERNODE_REGISTRY_CONTRACT: ''
      BONDING_REGISTRY_CONTRACT: ''
      INTERFOLD_DEPLOY_BLOCK: '0'
      CIPHERNODE_REGISTRY_DEPLOY_BLOCK: '0'
      BONDING_REGISTRY_DEPLOY_BLOCK: '0'
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ['CMD', 'pgrep', '-f', 'interfold']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  ciphernode_data: {}
