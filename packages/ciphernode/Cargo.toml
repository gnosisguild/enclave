[workspace]
members = [
  "core",
  "enclave",
  "enclave_node",
  "p2p",
  "bfv",
  "data",
  "evm",
  "fhe",
  "router",
  "keyshare",
  "aggregator",
  "test_helpers",
  "logger",
  "tests",
  "cipher",
  "config",
]
resolver = "2"


[workspace.dependencies]
enclave-core = { path = "core" }
data = { path = "data" }
sortition = { path = "sortition" }
cipher = { path = "cipher" }
actix = "0.13.5"
actix-rt = "2.10.0"
aes-gcm = "0.10.3"
alloy = { version = "=0.5.4", features = ["full"] }
alloy-signer-local = "=0.5.4"
alloy-network = "=0.5.4"
argon2 = "0.5.2" 
anyhow = "1.0.86"
async-std = { version = "1.12", features = ["attributes"] }
anvil = { git = "https://github.com/foundry-rs/foundry", package = "anvil" }
foundry-common = { git = "https://github.com/foundry-rs/foundry", package = "foundry-common" }
async-trait = "0.1"
bincode = "1.3.3"
bs58 = "0.5.1"
base64 = "0.22.1"
clap = { version = "4.5.17", features = ["derive"] }
dirs = "5.0.1"
figment = { version = "0.10.19", features = ["yaml", "test"] }
fhe_rs = { package = "fhe", git = "https://github.com/gnosisguild/fhe.rs", version = "0.1.0-beta.7" }
fhe-traits = { git = "https://github.com/gnosisguild/fhe.rs", version = "0.1.0-beta.7" }
fhe-util = { git = "https://github.com/gnosisguild/fhe.rs", version = "0.1.0-beta.7" }
futures = "0.3.30"
futures-util = "0.3"
hex = "0.4.3"
num = "0.4.3"
rand_chacha = "0.3.1"
rand = "0.8.5"
serde = { version = "1.0.208", features = ["derive"] }
sled = "0.34.7"
sha2 = "0.10.8"
tokio = { version = "1.38", features = ["full"] }
tracing = "0.1.37"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
libp2p = { version = "0.53.2", features = [
  "async-std",
  "identify",
  "macros",
  "noise",
  "ping",
  "rendezvous",
  "tcp",
  "tokio",
  "yamux",
  "mdns",
  "gossipsub",
  "quic",
] }
zeroize = "1.6.0"

[workspace.metadata.resolver]
alloy-signer-local = "=0.5.4"
alloy-network = "=0.5.4"

