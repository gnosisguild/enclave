[workspace]
members = [
  "server",
  ".interfold/support/dev",
  "program",
  "crates/zk-inputs",
  "crates/zk-inputs-wasm",
  "crates/evm_helpers",
  "crates/crisp-utils",
]
resolver = "3"

[workspace.package]
version = "0.1.0"
edition = "2021"
license = "LGPL-3.0-only"
description = "CRISP — Voting Application on Interfold"
repository = "https://github.com/gnosisguild/interfold"

[workspace.dependencies]
e3-user-program = { path = "./program" }
crisp-utils = { path = "./crates/crisp-utils" }

alloy = { version = "=1.0.41", features = ["full", "rpc-types-eth"] }
alloy-primitives = { version = "=1.3.0", default-features = false, features = [
    "rlp",
    "serde",
    "std",
]}
alloy-sol-types = { version = "=1.3.0" }
anyhow = { version = "=1.0.98" }
actix-web = "=4.11.0"
bincode = { version = "=1.3.3" }
bytemuck = { version = "=1.23.1" }
derivative = "=2.2.0"
e3-compute-provider = { path = "../../crates/compute-provider" }
e3-program-server = { path = "../../crates/program-server" }
e3-bfv-client = { path = "../../crates/bfv-client" }
e3-zk-helpers = { path = "../../crates/zk-helpers" }
e3-fhe-params = { path = "../../crates/fhe-params" }
e3-sdk = { path = "../../crates/sdk", default-features = false }
e3-polynomial = { path = "../../crates/polynomial" }
eyre = "=0.6.12"
env_logger = "=0.11.8"
hex = { version = "=0.4.3" }
log = { version = "=0.4.27" }
reqwest = { version = "=0.12.22", features = ["json"] }
serde = { version = "=1.0.228", features = ["derive", "std"] }
serde_json = "=1.0.141"
fhe = { git = "https://github.com/gnosisguild/fhe.rs", tag = "v0.2.2" }
fhe-traits = { git = "https://github.com/gnosisguild/fhe.rs", tag = "v0.2.2" }
fhe-math = { git = "https://github.com/gnosisguild/fhe.rs", tag = "v0.2.2" }
fhe-util = { git = "https://github.com/gnosisguild/fhe.rs", tag = "v0.2.2" }
tokio = { version = "=1.46.1", features = ["full"] }
rand = { version = "0.9" }
tracing-subscriber = { version = "=0.3.19", features = ["env-filter"] }
