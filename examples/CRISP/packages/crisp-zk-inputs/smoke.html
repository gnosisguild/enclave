<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>crisp-zk-inputs browser smoke</title>
  </head>
  <body>
    <script type="module">
      import { ZKInputsGenerator } from './main.js'

      try {
        const generator = ZKInputsGenerator.withDefaults()
        const keys = generator.generateKeys()
        const publicKey = keys.publicKey
        if (!(publicKey instanceof Uint8Array) || publicKey.length === 0) {
          throw new Error('generateKeys returned empty publicKey')
        }

        // wasm-bindgen Vec<i64> is passed as BigInt64Array (see crisp-sdk encoding.ts).
        const vote = BigInt64Array.from({ length: 512 }, (_, i) => BigInt(i % 2))
        const ciphertext = generator.encryptVote(publicKey, vote)
        if (!(ciphertext instanceof Uint8Array) || ciphertext.length === 0) {
          throw new Error('encryptVote returned empty ciphertext')
        }
        window.__wasmSmoke = 'ok'
      } catch (err) {
        window.__wasmSmoke = `error: ${err?.message ?? err}`
        console.error(err)
      }
    </script>
  </body>
</html>
