  #     timeout_secs: 600
  #     lock_timeout_secs: 300
  #     ramp_up_secs: 60
  #     lock_collateral_zkc: 2.0
  # Default profile: multithread uses (logical CPUs - 1) Rayon workers and the same concurrent job
