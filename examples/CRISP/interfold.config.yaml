# localhost: sync Interfold stack from packages/interfold-contracts/deployed_contracts.json after pnpm evm:deploy.
# e3_program (CRISPProgram): updated by `USE_MOCKS=true pnpm deploy:contracts` in packages/crisp-contracts.
