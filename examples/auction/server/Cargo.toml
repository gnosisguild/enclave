[package]
name = "auction-server"
version = "0.1.0"
edition = "2021"
license = "LGPL-3.0-only"

[dependencies]
auction-example = { path = ".." }
fhe = { git = "https://github.com/gnosisguild/fhe.rs" }
fhe-traits = { git = "https://github.com/gnosisguild/fhe.rs" }
actix-web = "4"
actix-cors = "0.7"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
rand = "0.8"
base64 = "0.22"
log = "0.4"
env_logger = "0.11"
