[package]
name = "auction-wasm"
version = "0.1.0"
edition = "2021"
license = "LGPL-3.0-only"

[lib]
crate-type = ["cdylib"]

[dependencies]
auction-example = { path = ".." }
fhe = { git = "https://github.com/gnosisguild/fhe.rs" }
fhe-traits = { git = "https://github.com/gnosisguild/fhe.rs" }
wasm-bindgen = "0.2"
getrandom = { version = "0.2", features = ["js"] }
rand = "0.8"
